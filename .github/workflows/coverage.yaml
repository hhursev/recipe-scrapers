name: coverage

on:
  push:
    branches: [ main, v14 ]
  pull_request:
    branches: [ main, v14 ]
    types: [ opened, synchronize, reopened ]

jobs:
  coverage:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install test packages
        run: pip install ".[tests]"
      - name: Run tests with coverage
        env:
          PYTHONWARNINGS: "always:::recipe_scrapers,ignore:::recipe_scrapers.plugins.static_values"
        run: |
          if python -c "import unittest_parallel" >/dev/null 2>&1; then
            coverage run --parallel-mode -m unittest_parallel --level test
            coverage combine
          else
            coverage run -m unittest
          fi
      - name: Report coverage to coveralls.io
        uses: coverallsapp/github-action@v2
        with:
          github-token: "SmlfzlVJy4ow55rduU7IU5GmmFCfAdGeq"
